<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        :root {
            --pink-main: #ffb7c5;
            --pink-dark: #ff8fab;
            --ribbon-red: #ff4d6d;
        }

        body {
            background-color: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Center Wrapper */
        #main-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        body::before {
            content: "🎀 🌸 🎀 🌸";
            font-size: 2rem;
            position: absolute;
            top: 20px;
        }

        h1 {
            color: var(--pink-dark);
            text-shadow: 2px 2px white;
            margin-bottom: 50px; /* Space for the letter to pop up */
            text-align: center;
        }

        /* Envelope Styling */
        .envelope-wrapper {
            position: relative;
            width: 200px;
            height: 150px;
            background: var(--pink-main);
            border-radius: 0 0 5px 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 2;
        }

        /* The Flap */
        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            z-index: 4;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 80px solid var(--pink-dark);
            transform-origin: top;
            transition: transform 0.5s ease;
        }

        /* The Front Cover of Envelope */
        .envelope-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 75px solid #ffcad4; /* Slightly lighter pink for depth */
            z-index: 3;
        }

        .letter {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 180px;
            height: 130px;
            background: white;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            transition: transform 0.6s ease, opacity 0.4s ease;
            z-index: 1; /* Hidden behind other layers initially */
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px dashed var(--pink-dark);
            opacity: 0; /* Fully invisible */
        }

        .letter img {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
            margin-top: 5px;
        }

        /* Animation States */
        .open.envelope-wrapper::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .open .letter {
            transform: translateY(-120px);
            z-index: 5; /* Moves to front of everything */
            opacity: 1;
            height: 200px;
        }

        .btn-container {
            margin-top: 50px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            background: var(--pink-dark);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #e07a91;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--ribbon-red);
        }

        button:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        #no-screen {
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <h1>Do you want to open now?</h1>
        
        <div class="envelope-wrapper" id="envelope-container">
            <div class="letter">
                <p style="font-size: 0.8rem; color: #ff4d6d; font-weight: bold; margin: 0;">HAPPY BIRTHDAY MY SWEETHEART</p>
                <img src="https://via.placeholder.com/150/ffb7c5/ffffff?text=Your+Photo" alt="Birthday Photo">
            </div>
        </div>

        <div class="btn-container" id="controls">
            <button onclick="openEnvelope()">YES</button>
            <button onclick="showNoScreen()">NO</button>
        </div>
    </div>

    <div id="no-screen">
        <h1>Pretty please? 🥺</h1>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHYycWp6Z3R3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZ29vZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" width="200">
        <br><br>
        <button onclick="backToYes()">Open Anyway</button>
    </div>

    <script>
        function openEnvelope() {
            document.getElementById('envelope-container').classList.add('open');
        }

        function showNoScreen() {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('no-screen').style.display = 'block';
        }

        function backToYes() {
            document.getElementById('no-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            // Slight delay so the transition back to flex feels smooth
            setTimeout(openEnvelope, 400);
        }
    </script>
</body>
</html>
