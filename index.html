<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        :root {
            --pink-main: #ffb7c5;
            --pink-dark: #ff8fab;
            --ribbon-red: #ff4d6d;
            --soft-text: #8b5e66;
            --whatsapp-green: #25D366;
        }

        body {
            background-color: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #main-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
        }

        .intro-text {
            color: var(--soft-text);
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-style: italic;
        }

        h1 {
            color: var(--pink-dark);
            text-shadow: 2px 2px white;
            margin-top: 0;
            margin-bottom: 60px;
        }

        /* Envelope Styling */
        .envelope-wrapper {
            position: relative;
            width: 200px;
            height: 150px;
            background: var(--pink-main);
            border-radius: 0 0 5px 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 2;
        }

        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            z-index: 4;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 80px solid var(--pink-dark);
            transform-origin: top;
            transition: transform 0.5s ease;
        }

        .envelope-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 75px solid #ffcad4;
            z-index: 3;
        }

        .letter {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 180px;
            height: 130px;
            background: white;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px dashed var(--pink-dark);
            opacity: 0;
        }

        .letter img {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
            margin-top: 5px;
        }

        .open.envelope-wrapper::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .open .letter {
            transform: translateY(-130px);
            z-index: 5;
            opacity: 1;
            height: 210px;
        }

        /* Buttons Control */
        .btn-container {
            margin-top: 60px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        button, .wa-link {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-choice {
            background: var(--pink-dark);
            color: white;
            box-shadow: 0 4px 0 #e07a91;
        }

        .btn-choice:hover {
            background: var(--ribbon-red);
            transform: scale(1.05);
        }

        /* WhatsApp Button Styling */
        #wa-button-container {
            display: none; /* Hidden by default */
            margin-top: 60px;
        }

        .wa-link {
            background: var(--whatsapp-green);
            color: white;
            box-shadow: 0 4px 0 #1da851;
            animation: fadeIn 0.8s ease forwards;
        }

        .wa-link:hover {
            background: #1ebe57;
            transform: translateY(-3px);
            box-shadow: 0 6px 0 #1da851;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #no-screen {
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <p class="intro-text">I made a little something special just for you! 💌✨</p>
        <h1>Do you want to open now?</h1>
        
        <div class="envelope-wrapper" id="envelope-container">
            <div class="letter">
                <p style="font-size: 0.8rem; color: #ff4d6d; font-weight: bold; margin: 0;">HAPPY BIRTHDAY MY SWEETHEART</p>
                <img src="https://via.placeholder.com/150/ffb7c5/ffffff?text=Your+Photo" alt="Birthday Photo">
            </div>
        </div>

        <div class="btn-container" id="initial-controls">
            <button class="btn-choice" onclick="handleYes()">YES</button>
            <button class="btn-choice" onclick="showNoScreen()">NO</button>
        </div>

        <div id="wa-button-container">
            <a href="https://wa.link/f4ajfg" target="_blank" class="wa-link">TEXT HIM 💬</a>
        </div>
    </div>

    <div id="no-screen">
        <h1>Pretty please? 🥺</h1>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHYycWp6Z3R3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZ29vZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" width="200">
        <br><br>
        <button class="btn-choice" onclick="backToYes()">Open Anyway</button>
    </div>

    <script>
        function handleYes() {
            // Open the envelope
            document.getElementById('envelope-container').classList.add('open');
            
            // Hide the Yes/No buttons
            document.getElementById('initial-controls').style.display = 'none';
            
            // Show the WhatsApp button
            document.getElementById('wa-button-container').style.display = 'block';
        }

        function showNoScreen() {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('no-screen').style.display = 'block';
        }

        function backToYes() {
            document.getElementById('no-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            setTimeout(handleYes, 400);
        }
    </script>
</body>
</html>
